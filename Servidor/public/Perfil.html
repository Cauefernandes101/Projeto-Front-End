    <img src="https://i.pinimg.com/564x/c7/ab/cd/c7abcd3ce378191a3dddfa4cdb2be46f.jpg" alt="Smiley face" style="float:left; width:42px; height:42px; ">

<main>
<div class="container1">

    <!-- SIDEBAR -->

      <div class="usuario-img"></div>

      <input type="file" id="upload" accept="image/*">
      <button>Lista de Livros</button>

      <div class="grafico"></div>

      <ul>

        <li style="color:hotpink;">Aventura</li>

        <li style="color:turquoise;">Suspense</li>
      </ul>

    </aside>
      <div >
        <h2>Leituras Recentes</h2>
          <section>
            
            <div class="scroll livros">
              <div class="livro"><img src="https://m.media-amazon.com/images/I/91wKDODkgWL._AC_UF1000,1000_QL80_.jpg"><p>Harry Potter</p></div>
              <div class="livro"><img src="https://m.media-amazon.com/images/I/51t39SMRzjL._AC_UF1000,1000_QL80_.jpg"><p>The Godfather</p></div>

            </div>
          </section>
      <!-- Livros Lidos -->
      <div >
        <h2>Adicionados recentemente</h2>
          <section>
            
            <div class="scroll livros">
              <div class="livro"><img src="https://m.media-amazon.com/images/I/91wKDODkgWL._AC_UF1000,1000_QL80_.jpg"><p>Harry Potter</p></div>

    </section>

</div>   
</main>
<footer>
  <p class="footer">Desenvolvedores: Cauê e Alexandre</p>
</footer>
<script src="/busca.js" defer>
   

    
const input = document.getElementById('upload');
const foto = document.getElementById('minhaFoto');

input.addEventListener('change', function(e) {
  const arquivo = e.target.files[0];

  if (arquivo) {
        // Criar o link temporário da imagem
    const urlDaImagem = URL.createObjectURL(arquivo);
        // Atribuir ao SRC da imagem
      foto.src = urlDaImagem;
  }
});
    
</script>
</body>
</html>
