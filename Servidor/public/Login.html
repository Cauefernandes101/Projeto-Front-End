<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="stylesheet" href="https://use.typekit.net/fcd8hzk.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>

<header class="header">
  <div class="logo" >
    <img src="imagens\Captura de tela 2026-05-07 174437.png" width="80" height="80">
    <h1>Estante Pública</h1>
  </div>
  <div class="header-right">
    <input type="text" placeholder="Search..."class="search">
    <img src="https://i.pinimg.com/564x/c7/ab/cd/c7abcd3ce378191a3dddfa4cdb2be46f.jpg" alt="Smiley face" style="float:left; width:42px; height:42px; ">
    <span class="perfil">Perfil</span>
    
  </div>
</header>
<main>
  <div class="centralizer">
    <h1>Faça o seu login</h1>
      <div >
        <form method="post" action="/logar_usuario">
          <div>Login: <input type="text" name="nome" /></div>
          <div>Senha: <input type="password" name="senha" /></div>
          <input type="submit" value="Logar" />
        </form>
      </div>
      <div >Não tem uma conta? <a href="cadastro.html">Cadastre-se aqui!</a></div>
    </div>  
</main>
<footer>
  <p class="footer">Desenvolvedores: Cauê e Alexandre</p>
</footer>
<script>

function login() {
  const nome = document.getElementById("nome").value;
    sessionStorage.setItem("userLogado", nome);
    sessionStorage.setItem("isLoggedIn", "true");
  
}

</script>
</body>
</html>
